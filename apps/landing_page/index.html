<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MultiChoice | Organize Better Choices</title>
    <meta name="description"
        content="MultiChoice helps you create, manage, and search your choices faster. Download it on Google Play.">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="bg-shape bg-shape-left" aria-hidden="true"></div>
    <div class="bg-shape bg-shape-right" aria-hidden="true"></div>

    <main class="page">
        <section class="hero" aria-labelledby="hero-title">
            <div class="hero-copy">
                <p class="eyebrow">MultiChoice App</p>
                <h1 id="hero-title">One Place For Your Everyday Decisions</h1>
                <p class="description">
                    MultiChoice helps you organize your options, compare ideas, and make quick
                    decisions with less effort. It is simple, fast, and designed for everyday use.
                </p>

                <a id="google-play-link" class="play-button"
                    href="https://play.google.com/store/apps/details?id=co.za.zanderkotze.multichoice" target="_blank"
                    rel="noopener noreferrer" aria-label="Get MultiChoice on Google Play">
                    <img src="https://play.google.com/intl/en_us/badges/static/images/badges/en_badge_web_generic.png"
                        alt="Get it on Google Play">
                </a>

                <p class="meta" id="remote-config-status">Available on Google Play.</p>
            </div>

            <figure class="hero-image-wrap" aria-label="App previews">
                <div class="phone-shot shot-back">
                    <img src="assets/vertical_light.png" alt="MultiChoice light mode preview" class="preview-mobile">
                </div>
                <div class="phone-shot shot-front">
                    <img src="assets/horizontal_dark.png" alt="MultiChoice dark mode board preview"
                        class="preview-board">
                </div>
            </figure>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
