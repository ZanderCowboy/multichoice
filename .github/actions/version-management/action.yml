name: "Version Management"
description: "Manages version bumping based on PR labels"

inputs:
  github_token:
    description: "GitHub token for authentication"
    required: true
  pubspec_path:
    description: "Path to the pubspec.yaml file"
    required: true
    default: "apps/multichoice/pubspec.yaml"
  branch_name:
    description: "Branch name to push changes to"
    required: true
    default: "develop"
  bump_type:
    description: "Type of version bump (major, minor, patch, none)"
    required: true
  version_suffix:
    description: "Optional suffix to add to the version (e.g. -RC)"
    required: false
    default: ""
  commit_changes:
    description: "If false, only computes and outputs the next version (no commit/push)."
    required: false
    default: "true"
  target_version:
    description: "Optional exact version to commit/push (e.g. 1.2.3+456). When set, bump_type is ignored."
    required: false
    default: ""

outputs:
  version_number:
    description: "The new version number, e.g. 1.2.3+456"
    value: ${{ steps.version_update.outputs.version_number }}
  version_part:
    description: "The version part without the build number, e.g. 1.2.3 or 1.2.3-RC"
    value: ${{ steps.version_update.outputs.version_part }}
  build_number:
    description: "The build number extracted from the version, e.g. 456"
    value: ${{ steps.version_update.outputs.build_number }}

runs:
  using: "composite"
  steps:
    ##############################################
    # Checkout Branch
    ##############################################
    - name: Checkout Branch
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.branch_name }}
        fetch-depth: 0
        token: ${{ inputs.github_token }}

    ##############################################
    # Get Current Version From pubspec.yaml
    ##############################################
    - name: Get Current Version From pubspec.yaml
      id: get_current_version
      shell: bash
      run: |
        set -euo pipefail
        echo "Checking version in ${{ inputs.pubspec_path }}:"
        if [[ ! -f "${{ inputs.pubspec_path }}" ]]; then
          echo "::error::File not found: ${{ inputs.pubspec_path }}"
          exit 1
        fi

        grep '^version:' "${{ inputs.pubspec_path }}" || {
          echo "::error::No version field found in ${{ inputs.pubspec_path }}"
          exit 1
        }

        if ! grep -qE '^version:[[:space:]]*[0-9]+\.[0-9]+\.[0-9]+(-RC)?\+[0-9]+$' "${{ inputs.pubspec_path }}"; then
          echo "::error::Invalid version format in ${{ inputs.pubspec_path }}. Expected format: x.y.z+build or x.y.z-RC+build"
          exit 1
        fi
        current_version=$(grep 'version:' ${{ inputs.pubspec_path }} | sed 's/version:[[:space:]]*//')
        echo "current_version=$current_version" >> $GITHUB_OUTPUT
        echo "Current version: $current_version"
        echo "***********************************"

    ##############################################
    # Update Version
    ##############################################
    - name: Update Version
      id: version_update
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
      run: |
        set -euo pipefail

        branch_name="${{ inputs.branch_name }}"
        pubspec_path="${{ inputs.pubspec_path }}"
        bump_type="${{ inputs.bump_type }}"
        version_suffix="${{ inputs.version_suffix }}"
        commit_changes="${{ inputs.commit_changes }}"
        target_version="${{ inputs.target_version }}"

        git config user.name "VersionBumpingBot"
        git config user.email "bot@versionbumpingbot.com"

        read_current_version() {
          local v
          v="$(grep '^version:' "$pubspec_path" | sed 's/version:[[:space:]]*//')"
          if ! echo "$v" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-RC)?\+[0-9]+$'; then
            echo "::error::Invalid version format in $pubspec_path: $v"
            exit 1
          fi
          echo "$v"
        }

        compute_next_version() {
          local current_version current_part current_build base_part major minor patch new_build new_part

          current_version="$(read_current_version)"
          current_part="$(echo "$current_version" | cut -d'+' -f1)"
          current_build="$(echo "$current_version" | cut -d'+' -f2)"

          if ! echo "$current_build" | grep -qE '^[0-9]+$'; then
            echo "::error::Invalid build number: $current_build"
            exit 1
          fi

          # Strip any existing suffix (we re-apply version_suffix deterministically below)
          base_part="${current_part%%-*}"
          if ! echo "$base_part" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version part: $current_part"
            exit 1
          fi

          IFS='.' read -r major minor patch <<< "$base_part"

          case "$bump_type" in
            major)
              major=$((major + 1)); minor=0; patch=0 ;;
            minor)
              minor=$((minor + 1)); patch=0 ;;
            patch)
              patch=$((patch + 1)) ;;
            none)
              : ;;
            *)
              echo "::error::Invalid bump_type: $bump_type. Expected: major, minor, patch, none"
              exit 1 ;;
          esac

          new_build=$((current_build + 1))
          new_part="$major.$minor.$patch"

          if [[ -n "$version_suffix" ]]; then
            new_part="${new_part}${version_suffix}"
          fi

          echo "${new_part}+${new_build}"
        }

        commit_version() {
          local new_version="$1"
          sed -i "s/^version: .*/version: $new_version/" "$pubspec_path"
          git add "$pubspec_path"
          git commit -m "Bump version to $new_version [skip ci]" >/dev/null
        }

        max_retries=3
        for attempt in $(seq 1 "$max_retries"); do
          echo "Version bump attempt $attempt/$max_retries"

          # Ensure we are on the latest remote tip before computing the next version.
          git fetch origin "$branch_name"
          git reset --hard "origin/$branch_name"

          current_version="$(read_current_version)"
          if [[ -n "$target_version" ]]; then
            next_version="$target_version"
            if ! echo "$next_version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-RC)?\+[0-9]+$'; then
              echo "::error::Invalid target_version: $next_version"
              exit 1
            fi
          else
            next_version="$(compute_next_version)"
          fi

          if [[ "$next_version" == "$current_version" ]]; then
            echo "::error::Next version equals current version ($current_version); refusing to commit"
            exit 1
          fi

          echo "Updating version: $current_version -> $next_version"

          # Compute-only mode (no commit/push)
          if [[ "$commit_changes" != "true" ]]; then
            version_part="$(echo "$next_version" | cut -d'+' -f1)"
            build_number="$(echo "$next_version" | cut -d'+' -f2)"
            echo "version_part=$version_part" >> "$GITHUB_OUTPUT"
            echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
            echo "version_number=$next_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          commit_version "$next_version"

          if git push origin "HEAD:$branch_name"; then
            version_part="$(echo "$next_version" | cut -d'+' -f1)"
            build_number="$(echo "$next_version" | cut -d'+' -f2)"
            echo "version_part=$version_part" >> "$GITHUB_OUTPUT"
            echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
            echo "version_number=$next_version" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::Push failed (possible version conflict). Retrying in 5 seconds..."
          sleep 5
        done

        echo "::error::Failed to bump/push version after $max_retries attempts"
        exit 1
