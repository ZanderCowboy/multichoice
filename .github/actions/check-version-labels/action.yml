name: "Check Version Labels"
description: "Checks PR labels and determines version bump type"

inputs:
  labels:
    description: "JSON string of PR labels"
    required: true
  feature_label:
    description: "Label that maps to a minor bump"
    required: false
    default: "feature"
  bug_label:
    description: "Label that maps to a patch bump"
    required: false
    default: "bug"
  no_build_label:
    description: "Label that indicates no build should be performed"
    required: false
    default: "no-build"

outputs:
  bump_type:
    description: "Type of version bump (major, minor, patch, none)"
    value: ${{ steps.check_labels.outputs.bump_type }}

runs:
  using: "composite"
  steps:
    - name: Check Version Labels
      id: check_labels
      shell: bash
      env:
        LABELS: ${{ inputs.labels }}
        FEATURE_LABEL: ${{ inputs.feature_label }}
        BUG_LABEL: ${{ inputs.bug_label }}
        NO_BUILD_LABEL: ${{ inputs.no_build_label }}
      run: |
        set -e

        echo "LABELS: $LABELS"
        echo "FEATURE_LABEL: $FEATURE_LABEL"
        echo "BUG_LABEL: $BUG_LABEL"
        echo "NO_BUILD_LABEL: $NO_BUILD_LABEL"

        # Validate JSON format
        if ! echo "$LABELS" | jq empty 2>/dev/null; then
          echo "::error::Invalid JSON format in labels"
          exit 1
        fi

        has_no_build=$(echo "$LABELS" | jq -r --arg no_build "$NO_BUILD_LABEL" 'map(.name) | index($no_build) != null')
        has_feature=$(echo "$LABELS" | jq -r --arg feature "$FEATURE_LABEL" 'map(.name) | index($feature) != null')
        has_bug=$(echo "$LABELS" | jq -r --arg bug "$BUG_LABEL" 'map(.name) | index($bug) != null')

        if [[ "$has_no_build" == "true" ]]; then
          echo "bump_type=none" >> "$GITHUB_OUTPUT"
          echo "********** no-build label present, skipping semantic bump **********"
        elif [[ "$has_feature" == "true" ]]; then
          echo "bump_type=minor" >> "$GITHUB_OUTPUT"
          echo "********** feature label present, bumping minor **********"
        elif [[ "$has_bug" == "true" ]]; then
          echo "bump_type=patch" >> "$GITHUB_OUTPUT"
          echo "********** bug label present, bumping patch **********"
        else
          echo "bump_type=none" >> "$GITHUB_OUTPUT"
          echo "********** no feature/bug label found, bumping build only **********"
        fi
