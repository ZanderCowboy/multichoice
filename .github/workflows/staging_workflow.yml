---
# This workflow runs for RC branches that have an open PR targeting main.
# It executes on PR updates (synchronize), bumps only the build number,
# keeps the -RC suffix, and publishes to Google Play internal track.
#
# Supported RC branch patterns (examples):
# - rc
# - rc/1
# - rc/2026-03
# - rc-1
# - rc-feature-freeze
# - rc_1
# - rc_hotfix
# - rc/mobile/stabilization
name: rc-workflow
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:
    inputs:
      target_branch:
        description: "RC branch to build"
        required: true
        default: "rc"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preBuild:
    name: Prebuild - Version Management
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && startsWith(github.head_ref, 'rc')) }}
    runs-on: ubuntu-latest
    concurrency:
      group: build-group
      cancel-in-progress: false
    outputs:
      version_number: ${{ steps.version_management.outputs.version_number }}
      version_part: ${{ steps.version_management.outputs.version_part }}
      build_number: ${{ steps.version_management.outputs.build_number }}
      target_branch: ${{ steps.resolve_branch.outputs.target_branch }}

    steps:
      ##############################################
      # Resolve Target Branch
      ##############################################
      - name: Resolve Target Branch
        id: resolve_branch
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target_branch="${{ inputs.target_branch }}"
          else
            target_branch="${{ github.head_ref }}"
          fi

          if [[ -z "$target_branch" ]]; then
            echo "::error::Target branch could not be resolved"
            exit 1
          fi

          echo "target_branch=$target_branch" >> "$GITHUB_OUTPUT"
          echo "Using target branch: $target_branch"

      ##############################################
      # Checkout Repository
      ##############################################
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ steps.resolve_branch.outputs.target_branch }}

      ##############################################
      # Generate GitHub App Token
      ##############################################
      - name: Generate GitHub App Token
        id: generate_token
        uses: peter-murray/workflow-application-token-action@v4
        with:
          application_id: ${{ secrets.VERSION_BOT_APP_ID }}
          application_private_key: ${{ secrets.VERSION_BOT_APP_PRIVATE_KEY }}

      ##############################################
      # Version Management
      ##############################################
      - name: Version Management
        id: version_management
        uses: ./.github/actions/version-management
        with:
          github_token: ${{ steps.generate_token.outputs.token }}
          pubspec_path: apps/multichoice/pubspec.yaml
          branch_name: ${{ steps.resolve_branch.outputs.target_branch }}
          bump_type: none
          version_suffix: "-RC"

  build:
    name: Builds Android App
    needs: [preBuild]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
      statuses: write
    steps:
      ##############################################
      # Checkout Repository
      ##############################################
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preBuild.outputs.target_branch }}

      ##############################################
      # Set up Flutter and Java
      ##############################################
      - name: Set up Flutter and Java
        uses: ./.github/actions/setup-flutter-with-java

      ##############################################
      # Download and Prepare Android Keystore, Key Properties, Secrets Dart, Google Services
      ##############################################
      - name: Prepare Android Release Files
        uses: ./.github/actions/prepare-android-release-files
        with:
          android_keystore_base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          store_password: ${{ secrets.STORE_PASSWORD }}
          key_password: ${{ secrets.KEY_PASSWORD }}
          key_alias: ${{ secrets.KEY_ALIAS }}
          web_api_key: ${{ secrets.WEB_API_KEY }}
          web_app_id: ${{ secrets.WEB_APP_ID }}
          android_api_key: ${{ secrets.ANDROID_API_KEY }}
          android_app_id: ${{ secrets.ANDROID_APP_ID }}
          ios_api_key: ${{ secrets.IOS_API_KEY }}
          ios_app_id: ${{ secrets.IOS_APP_ID }}
          google_services_json_b64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}

      ##############################################
      # Build App Bundle
      ##############################################
      - name: Build App Bundle
        env:
          FLUTTER_BUILD_NAME: ${{ needs.preBuild.outputs.version_part }}
          FLUTTER_BUILD_NUMBER: ${{ needs.preBuild.outputs.build_number }}
        run: flutter build appbundle --release --build-name=${{ env.FLUTTER_BUILD_NAME }} --build-number=${{ env.FLUTTER_BUILD_NUMBER }}
        working-directory: apps/multichoice/

      ##############################################
      # Upload App Bundle as Artifact
      ##############################################
      - name: Upload Android App Bundle
        uses: actions/upload-artifact@v7
        with:
          name: "android-release-appbundle"
          path: ./apps/multichoice/build/app/outputs/bundle/release/app-release.aab

      ###############################################
      # Release to Google Play Internal Track
      ###############################################
      - name: Release Build to internal track
        uses: r0adkll/upload-google-play@v1
        with:
          releaseFiles: apps/multichoice/build/app/outputs/bundle/release/app-release.aab
          serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          packageName: "co.za.zanderkotze.multichoice"
          track: "internal"
          releaseName: ${{ needs.preBuild.outputs.version_number }}
          status: "completed"

      ##############################################
      # Create New Tag
      ##############################################
      - name: Create New Tag
        uses: ./.github/actions/create-git-tag
        with:
          version_number: ${{ needs.preBuild.outputs.version_number }}
          tag_strategy: "full"
          allowed_formats: "rc"