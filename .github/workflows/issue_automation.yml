  celebrate:
    name: 🎉 Celebrate Contributions
    runs-on: ubuntu-latest
    if: |
      (github.event.action == 'opened' && github.event.pull_request) ||
      (github.event.action == 'labeled' && github.event.label.name == 'good first issue')
    
    steps:
      - name: 🌟 First-time contributor celebration
        if: github.event.pull_request && github.actor != 'ZanderCowboy'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if this is the user's first contribution
            const { data: pullRequests } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: context.actor,
              state: 'all'
            });
            
            if (pullRequests.length === 1) {
              const celebrationComment = `
              ## 🎉 First Contribution! 
              
              Wow! This is your first contribution to **Multichoice**! 🎊
              
              Thank you for:
              - 🤝 Joining our community
              - 🛠️ Improving the project
              - 🌟 Making Multichoice better for everyone
              
              ### What's Next?
              - ✅ Your PR will be reviewed by maintainers
              - 🔄 You might receive feedback for improvements
              - 🚀 Once approved, your code will be merged!
              
              ### Keep Contributing!
              - 🏷️ Look for more \`good first issue\` labels
              - 💬 Join our [Discussions](https://github.com/ZanderCowboy/multichoice/discussions)
              - 📖 Check out our [roadmap](https://github.com/ZanderCowboy/multichoice/projects)
              
              **Welcome to the team!** 🚀✨
              `;
              
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: celebrationComment
              });
            }

      - name: 🎯 Good first issue guidance
        if: github.event.action == 'labeled' && github.event.label.name == 'good first issue'
        uses: actions/github-script@v7
        with:
          script: |
            const guidanceComment = `
            ## 🌱 Perfect for First-Time Contributors!
            
            This issue has been marked as a **good first issue** - great for newcomers! 
            
            ### 🚀 Getting Started:
            1. **Comment** to get assigned to this issue
            2. **Fork** the repository
            3. **Read** our [Contributing Guide](https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${context.ref.replace('refs/heads/', '')}/CONTRIBUTION.md)
            4. **Set up** your development environment
            5. **Create** a branch: \`${context.payload.issue.number}-${context.payload.issue.title.toLowerCase().replace(/[^a-z0-9]/g, '-')}\`
            
            ### 💡 Need Help?
            - 📚 Check existing documentation in \`/docs/\`
            - 💬 Ask questions in [Discussions](https://github.com/ZanderCowboy/multichoice/discussions)
            - 🔍 Look at similar completed issues for examples
            
            **We're here to support you!** 🤝
            `;
            
            await github.rest.issues.createComment({
              issue_number: context.payload.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: guidanceComment
            });
