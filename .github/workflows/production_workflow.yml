---
# This workflow is manually triggered.
# It derives the next production version from the latest RC tag by:
# - removing the -RC suffix
# - incrementing build number by 1 (no semantic major/minor/patch bump)
#
# Example:
# - latest RC tag: v1.3.7-RC+155
# - production version built and released: 1.3.7+156
name: main-workflow
on:
    workflow_dispatch:
        inputs:
            release_type:
                description: "Legacy input kept for compatibility (not used for semantic bumps)"
                required: true
                type: choice
                default: patch
                options:
                    - patch
                    - minor
                    - major
            target_branch:
                description: "Branch to build and update"
                required: true
                type: string
                default: main
            skip_github_release:
                description: "Skip creating a GitHub Release"
                required: true
                type: boolean
                default: false

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    preBuild:
        name: Prebuild - Version Management
        runs-on: ubuntu-latest
        concurrency:
            group: build-group
            cancel-in-progress: false
        outputs:
            version_number: ${{ steps.resolve_version.outputs.version_number }}
            version_part: ${{ steps.resolve_version.outputs.version_part }}
            build_number: ${{ steps.resolve_version.outputs.build_number }}

        steps:
            ##############################################
            # Checkout Repository
            ##############################################
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ inputs.target_branch }}

            ##############################################
            # Resolve Production Version From Latest RC Tag
            ##############################################
            - name: Resolve Production Version From Latest RC Tag
              id: resolve_version
              shell: bash
              run: |
                  set -euo pipefail
                  git fetch --tags

                  latest_rc_tag=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+-RC\+[0-9]+$' | head -n1)
                  if [[ -z "$latest_rc_tag" ]]; then
                    echo "::error::No RC tag found in format vX.Y.Z-RC+N"
                    exit 1
                  fi

                  rc_version=${latest_rc_tag#v}
                  rc_version_part=$(echo "$rc_version" | cut -d'+' -f1)
                  rc_build_number=$(echo "$rc_version" | cut -d'+' -f2)

                  if [[ ! "$rc_version_part" =~ ^[0-9]+\.[0-9]+\.[0-9]+-RC$ ]]; then
                    echo "::error::Invalid RC version part: $rc_version_part"
                    exit 1
                  fi

                  if [[ ! "$rc_build_number" =~ ^[0-9]+$ ]]; then
                    echo "::error::Invalid RC build number: $rc_build_number"
                    exit 1
                  fi

                  version_part=${rc_version_part%-RC}
                  build_number=$((rc_build_number + 1))
                  version_number="$version_part+$build_number"

                  echo "version_part=$version_part" >> "$GITHUB_OUTPUT"
                  echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
                  echo "version_number=$version_number" >> "$GITHUB_OUTPUT"

            ##############################################
            # Generate GitHub App Token
            ##############################################
            - name: Generate GitHub App Token
              id: generate_token
              uses: peter-murray/workflow-application-token-action@v4
              with:
                  application_id: ${{ secrets.VERSION_BOT_APP_ID }}
                  application_private_key: ${{ secrets.VERSION_BOT_APP_PRIVATE_KEY }}

            ##############################################
            # Commit Version Update
            ##############################################
            - name: Commit Version Update
              uses: ./.github/actions/tokenized-commit
              with:
                  github_token: ${{ steps.generate_token.outputs.token }}
                  repository: ${{ github.repository }}
                  file_path: apps/multichoice/pubspec.yaml
                  commit_message: "Release version ${{ steps.resolve_version.outputs.version_number }} [skip ci]"
                  branch_name: ${{ inputs.target_branch }}
                  version_with_build: ${{ steps.resolve_version.outputs.version_number }}

    build:
        name: Builds Android App
        needs: [preBuild]
        runs-on: ubuntu-latest
        permissions:
            contents: write
            packages: read
            statuses: write
        outputs:
            tag_version: ${{ steps.create_tag.outputs.tag_version }}
            build_number: ${{ needs.preBuild.outputs.build_number }}
        steps:
            ##############################################
            # Checkout Repository
            ##############################################
            - name: Checkout Repository
              uses: actions/checkout@v6
              with:
                  ref: ${{ inputs.target_branch }}

            ##############################################
            # Set up Flutter and Java
            ##############################################
            - name: Set up Flutter and Java
              uses: ./.github/actions/setup-flutter-with-java

            ##############################################
            # Download and Prepare Android Keystore, Key Properties, Secrets Dart, Google Services
            ##############################################
            - name: Prepare Android Release Files
              uses: ./.github/actions/prepare-android-release-files
              with:
                  android_keystore_base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
                  store_password: ${{ secrets.STORE_PASSWORD }}
                  key_password: ${{ secrets.KEY_PASSWORD }}
                  key_alias: ${{ secrets.KEY_ALIAS }}
                  web_api_key: ${{ secrets.WEB_API_KEY }}
                  web_app_id: ${{ secrets.WEB_APP_ID }}
                  android_api_key: ${{ secrets.ANDROID_API_KEY }}
                  android_app_id: ${{ secrets.ANDROID_APP_ID }}
                  ios_api_key: ${{ secrets.IOS_API_KEY }}
                  ios_app_id: ${{ secrets.IOS_APP_ID }}
                  google_services_json_b64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}

            ##############################################
            # Build APK
            ##############################################
            - name: Build APK
              env:
                  FLUTTER_BUILD_NAME: ${{ needs.preBuild.outputs.version_part }}
                  FLUTTER_BUILD_NUMBER: ${{ needs.preBuild.outputs.build_number }}
              run: flutter build apk --release --build-name=${{ env.FLUTTER_BUILD_NAME }} --build-number=${{ env.FLUTTER_BUILD_NUMBER }}
              working-directory: apps/multichoice/

            ##############################################
            # Upload APK as Artifact
            ##############################################
            - name: Upload Android APK
              uses: actions/upload-artifact@v7
              with:
                  name: "android-release-apk"
                  path: ./apps/multichoice/build/app/outputs/flutter-apk/app-release.apk

            ##############################################
            # Build App Bundle
            ##############################################
            - name: Build App Bundle
              env:
                  FLUTTER_BUILD_NAME: ${{ needs.preBuild.outputs.version_part }}
                  FLUTTER_BUILD_NUMBER: ${{ needs.preBuild.outputs.build_number }}
              run: flutter build appbundle --release --build-name=${{ env.FLUTTER_BUILD_NAME }} --build-number=${{ env.FLUTTER_BUILD_NUMBER }}
              working-directory: apps/multichoice/

            ##############################################
            # Upload App Bundle as Artifact
            ##############################################
            - name: Upload Android App Bundle
              uses: actions/upload-artifact@v7
              with:
                  name: "android-release-appbundle"
                  path: ./apps/multichoice/build/app/outputs/bundle/release/app-release.aab

            ###############################################
            # Release to Google Play Production Track
            ###############################################
            - name: Release Build to production track
              uses: r0adkll/upload-google-play@v1
              with:
                  releaseFiles: apps/multichoice/build/app/outputs/bundle/release/app-release.aab
                  serviceAccountJsonPlainText: ${{ secrets.SERVICE_ACCOUNT_JSON }}
                  packageName: "co.za.zanderkotze.multichoice"
                  track: "production"
                  releaseName: ${{ needs.preBuild.outputs.version_number }}
                  status: "completed"

            ##############################################
            # Create New Tag
            ##############################################
            - name: Create New Tag
              id: create_tag
              uses: ./.github/actions/create-git-tag
              with:
                  version_number: ${{ needs.preBuild.outputs.version_number }}
                  tag_strategy: "full"
                  allowed_formats: "standard"

    create-release:
        name: Create GitHub Release
        needs: [build]
        runs-on: ubuntu-latest
        permissions:
            contents: write
        if: needs.build.outputs.tag_version != '' && !inputs.skip_github_release
        steps:
            ##############################################
            # Download APK Artifact
            ##############################################
            - name: Download APK Artifact
              uses: actions/download-artifact@v8
              with:
                  name: "android-release-apk"
                  path: ./artifacts/

            ##############################################
            # Create GitHub Release
            ##############################################
            - name: Create GitHub Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  VERSION: ${{ needs.build.outputs.tag_version }}
              with:
                  tag_name: v${{ env.VERSION }}
                  release_name: Release v${{ env.VERSION }}
                  body: |
                      ## What's New in v${{ env.VERSION }}

                      Production release for MultiChoice.

                      ### Technical Details
                      - Build Number: ${{ needs.build.outputs.build_number }}
                      - Platform: Android

                      ### 📋 Release Notes
                      For detailed release notes, please check the [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) file.
                  draft: false
                  prerelease: false

            ##############################################
            # Upload APK to Release
            ##############################################
            - name: Upload APK to Release
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./artifacts/app-release.apk
                  asset_name: multichoice-v${{ needs.build.outputs.tag_version }}.apk
                  asset_content_type: application/vnd.android.package-archive
