name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "feature-request"]
assignees:
  - ZanderCowboy

body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        
        We love hearing about new ideas! Keep it short—details can go in comments.
        
        > **Tip**: Before submitting, check if a similar feature request already exists.

  - type: input
    id: feature-title
    attributes:
      label: 🎯 Feature Title
      description: A clear and concise title for your feature request
      placeholder: "Example: Add dark mode toggle to settings"
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: 🤔 Problem Statement
      description: What problem does this feature solve?
      placeholder: "I'm always frustrated when... / Users need a way to..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: 💡 Proposed Solution
      description: Describe your ideal solution
      placeholder: "I would like to see... / The app should..."
    validations:
      required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: 🏷️ Feature Type
      description: What kind of feature is this?
      options:
        - "🎨 UI/UX Enhancement"
        - "🔧 New Functionality"
        - "📦 Data / Storage"
        - "🔌 Integration / API"
        - "⚡ Performance"
        - "🌐 Accessibility"
        - "🔒 Security"
        - "🧪 Testing / QA"
        - "✨ Other"
    validations:
      required: true

  - type: textarea
    id: mockups-designs
    attributes:
      label: 🎨 Mockups/Designs
      description: Any visual mockups, wireframes, or design ideas
      placeholder: "Drag and drop images here or provide links to designs"
    validations:
      required: false

  - type: textarea
    id: technical-considerations
    attributes:
      label: 🔧 Technical Considerations
      description: Any technical requirements or constraints to consider
      placeholder: |
        - Should work on Android and iOS
        - Needs to integrate with existing theme system
        - May require new dependencies
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 🔄 Alternative Solutions
      description: Other solutions you've considered
      placeholder: "I also considered... / Another approach could be..."
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: 📝 Additional Context
      description: Any other information that might be helpful
      placeholder: "References to similar features in other apps, relevant links, etc."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: ✅ Quick check
      options:
        - label: I searched for an existing feature request
          required: true
